server:
  address: 0.0.0.0
  port: 8888

# Spring 配置
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:test}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: false

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL 日志

# 日志配置
logging:
  level:
    root: INFO                              # 全局默认日志级别
    org.apache.ibatis: DEBUG                # MyBatis 核心 SQL 日志，打印执行的 SQL、参数和耗时
    com.baomidou.mybatisplus: INFO          # MyBatis-Plus 内部操作日志，如分页、Wrapper 构建，可调为 DEBUG
    org.springframework.web.socket: INFO    # Spring WebSocket 日志，消息传输和连接状态
    org.springframework.messaging: INFO     # Spring Messaging 日志，消息发送/接收情况
